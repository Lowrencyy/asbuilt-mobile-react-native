<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP Preloader</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #050816;
        color: white;
        overflow: hidden;
      }

      body {
        position: relative;
      }

      /* PRELOADER */
      .preloader {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at top,
            rgba(0, 180, 255, 0.15),
            transparent 40%
          ),
          linear-gradient(135deg, #030712, #0b1120 60%, #020617);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      .preloader::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: rgba(0, 174, 255, 0.08);
        filter: blur(80px);
        animation: pulseGlow 2.5s ease-in-out infinite;
      }

      @keyframes pulseGlow {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.7;
        }
        50% {
          transform: scale(1.18);
          opacity: 1;
        }
      }

      .loader-wrap {
        width: min(420px, 85vw);
        text-align: center;
        position: relative;
        z-index: 2;
      }

      .loader-title {
        font-size: clamp(24px, 5vw, 42px);
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 18px;
        background: linear-gradient(90deg, #fff, #7dd3fc, #38bdf8, #fff);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }

      @keyframes shimmer {
        to {
          background-position: 200% center;
        }
      }

      .loader-sub {
        font-size: 13px;
        letter-spacing: 6px;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 30px;
        text-transform: uppercase;
      }

      .progress-shell {
        width: 100%;
        height: 14px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        overflow: hidden;
        box-shadow:
          inset 0 0 12px rgba(255, 255, 255, 0.03),
          0 0 18px rgba(56, 189, 248, 0.08);
        backdrop-filter: blur(10px);
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #22d3ee, #38bdf8, #2563eb);
        box-shadow:
          0 0 12px rgba(56, 189, 248, 0.6),
          0 0 30px rgba(37, 99, 235, 0.35);
        transform-origin: left center;
      }

      .progress-meta {
        margin-top: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
      }

      .percent {
        font-size: 32px;
        font-weight: 700;
        color: #e0f2fe;
        text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
      }

      .scanline {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(255, 255, 255, 0.03) 50%,
          transparent 100%
        );
        background-size: 100% 6px;
        opacity: 0.18;
        pointer-events: none;
        z-index: 1;
      }

      /* CONTENT */
      .main-content {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        opacity: 0;
        transform: scale(1.04);
        background:
          radial-gradient(
            circle at center,
            rgba(59, 130, 246, 0.08),
            transparent 35%
          ),
          linear-gradient(135deg, #020617, #0f172a);
      }

      .hero {
        text-align: center;
        padding: 20px;
      }

      .hero h1 {
        font-size: clamp(32px, 6vw, 70px);
        margin-bottom: 10px;
        letter-spacing: 2px;
      }

      .hero p {
        color: rgba(255, 255, 255, 0.65);
        font-size: clamp(14px, 2vw, 18px);
      }

      /* teardown panels */
      .panel {
        position: fixed;
        inset: 0;
        z-index: 10000;
        pointer-events: none;
        display: flex;
      }

      .panel .left,
      .panel .right {
        width: 50%;
        height: 100%;
        background: linear-gradient(135deg, #020617, #0b1120);
      }

      .panel .left {
        border-right: 1px solid rgba(255, 255, 255, 0.04);
      }

      .panel .right {
        border-left: 1px solid rgba(255, 255, 255, 0.04);
      }
    </style>
  </head>
  <body>
    <div class="preloader" id="preloader">
      <div class="scanline"></div>

      <div class="loader-wrap">
        <div class="loader-title">Initializing</div>
        <div class="loader-sub">system boot sequence</div>

        <div class="progress-shell">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="progress-meta">
          <span>Status: Loading assets</span>
          <span class="percent" id="percent">0%</span>
        </div>
      </div>
    </div>

    <div class="panel" id="panel">
      <div class="left"></div>
      <div class="right"></div>
    </div>

    <main class="main-content" id="mainContent">
      <div class="hero">
        <h1>Website Ready</h1>
        <p>Smooth GSAP teardown animation with cinematic preload experience.</p>
      </div>
    </main>

    <!-- GSAP CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script>
      const progressBar = document.getElementById("progressBar");
      const percent = document.getElementById("percent");
      const preloader = document.getElementById("preloader");
      const mainContent = document.getElementById("mainContent");
      const panel = document.getElementById("panel");
      const leftPanel = panel.querySelector(".left");
      const rightPanel = panel.querySelector(".right");

      let load = 0;

      gsap.set(panel, { autoAlpha: 0 });
      gsap.set(mainContent, { autoAlpha: 0, scale: 1.04 });

      function updateProgress(value) {
        progressBar.style.width = value + "%";
        percent.textContent = value + "%";
      }

      function fakeLoader() {
        const interval = setInterval(() => {
          let step = Math.floor(Math.random() * 9) + 3;
          load += step;

          if (load >= 100) {
            load = 100;
            updateProgress(load);
            clearInterval(interval);
            playTeardown();
          } else {
            updateProgress(load);
          }
        }, 140);
      }

      function playTeardown() {
        const tl = gsap.timeline();

        tl.to(".loader-wrap", {
          y: -18,
          opacity: 0.85,
          duration: 0.35,
          ease: "power2.out",
        })

          .to(
            ".progress-bar",
            {
              boxShadow:
                "0 0 30px rgba(56,189,248,0.95), 0 0 60px rgba(37,99,235,0.6)",
              duration: 0.25,
            },
            "<",
          )

          .to(preloader, {
            scale: 1.03,
            duration: 0.45,
            ease: "power2.inOut",
          })

          .set(panel, { autoAlpha: 1 })

          .to(
            preloader,
            {
              autoAlpha: 0,
              duration: 0.35,
              ease: "power2.out",
            },
            "-=0.15",
          )

          .fromTo(
            leftPanel,
            { xPercent: 0 },
            { xPercent: -100, duration: 1.0, ease: "power4.inOut" },
            "-=0.1",
          )

          .fromTo(
            rightPanel,
            { xPercent: 0 },
            { xPercent: 100, duration: 1.0, ease: "power4.inOut" },
            "<",
          )

          .to(
            mainContent,
            {
              autoAlpha: 1,
              scale: 1,
              duration: 1,
              ease: "power3.out",
            },
            "-=0.55",
          )

          .set(preloader, { display: "none" })
          .set(panel, { display: "none" })
          .set(document.body, { overflow: "auto" });
      }

      // Optional: intro animation
      gsap.from(".loader-title", {
        y: 30,
        opacity: 0,
        duration: 1,
        ease: "power3.out",
      });

      gsap.from(".loader-sub", {
        y: 15,
        opacity: 0,
        duration: 1,
        delay: 0.15,
        ease: "power3.out",
      });

      gsap.from(".progress-shell", {
        y: 20,
        opacity: 0,
        duration: 1,
        delay: 0.25,
        ease: "power3.out",
      });

      gsap.from(".progress-meta", {
        y: 20,
        opacity: 0,
        duration: 1,
        delay: 0.35,
        ease: "power3.out",
      });

      fakeLoader();
    </script>
  </body>
</html>
